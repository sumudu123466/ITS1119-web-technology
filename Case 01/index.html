<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Case 1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="side-menu">
        <ul>
            <li class="menu-item purple">
                <span class="text">Menu One</span>
                <i class="fa-solid fa-address-book"></i>
            </li>
            <li class="menu-item blue">
                <span class="text">Menu Two</span>
                <i class="fa-solid fa-truck-medical"></i>
            </li>
            <li class="menu-item red">
                <span class="text">Menu Three</span>
                <i class="fa-solid fa-passport"></i>
            </li>
            <li class="menu-item green">
                <span class="text">Menu Four</span>
                <i class="fa-solid fa-layer-group"></i>
            </li>
            <li class="menu-item orange">
                <span class="text">Menu Five</span>
                <i class="fa-solid fa-cart-shopping"></i>
            </li>
        </ul>
    </nav>

</body>
</html>
